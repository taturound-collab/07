<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบเจ้าหน้าที่ | Blissiam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="config.js"></script>
    <link id="blissiam-font-link" href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['var(--font-body)', 'Kanit', 'sans-serif'] },
                    colors: {
                        paper: { 50: '#fdfcfa', 100: '#f6f3ee', 200: '#ece7de', 300: '#ddd6c9' },
                        ink: { 900: '#1a1a1a', 700: '#3a3a3a', 500: '#6b6b6b', 300: '#9c9c9c', 200: '#c2c2c2' },
                        primary: {
                            50: 'var(--color-primary-50)', 100: 'var(--color-primary-100)', 200: 'var(--color-primary-200)',
                            300: 'var(--color-primary-300)', 400: 'var(--color-primary-400)', 500: 'var(--color-primary-500)',
                            600: 'var(--color-primary-600)', 700: 'var(--color-primary-700)'
                        },
                        secondary: {
                            50: 'var(--color-secondary-50)', 100: 'var(--color-secondary-100)', 200: 'var(--color-secondary-200)',
                            300: 'var(--color-secondary-300)', 400: 'var(--color-secondary-400)', 500: 'var(--color-secondary-500)',
                            600: 'var(--color-secondary-600)'
                        },
                        line: '#e8e3d9'
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --color-primary-50: #f3f7f1; --color-primary-100: #e3ece0; --color-primary-200: #c5dcc0;
            --color-primary-300: #9dc295; --color-primary-400: #739e6b; --color-primary-500: #4D7355;
            --color-primary-600: #3d5d44; --color-primary-700: #314936;
            --color-secondary-50: #fbf3ea; --color-secondary-100: #f3e0c8; --color-secondary-200: #e6bf8e;
            --color-secondary-300: #cc9655; --color-secondary-400: #A8662A; --color-secondary-500: #925621; --color-secondary-600: #74441a;
            --font-body: 'Kanit', sans-serif;
        }
    </style>
    <script src="theme.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f6f3ee; background-image: radial-gradient(circle at 15% 10%, var(--color-primary-50) 0%, transparent 45%), radial-gradient(circle at 85% 90%, var(--color-secondary-50) 0%, transparent 45%); background-attachment: fixed; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-ink-900">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const supabase = window.supabaseClient;

        function DotLogo({ size = 28 }) {
            return (
                <svg width={size} height={size} viewBox="0 0 28 28" fill="none">
                    <circle cx="4" cy="4" r="3" fill="#1a1a1a"/><circle cx="14" cy="4" r="3" fill="#1a1a1a"/><circle cx="24" cy="4" r="3" fill="#1a1a1a"/>
                    <circle cx="4" cy="14" r="3" fill="#1a1a1a"/><circle cx="14" cy="14" r="3" fill="var(--color-primary-500)"/><circle cx="24" cy="14" r="3" fill="#1a1a1a"/>
                    <circle cx="4" cy="24" r="3" fill="#1a1a1a"/><circle cx="14" cy="24" r="3" fill="#1a1a1a"/><circle cx="24" cy="24" r="3" fill="#1a1a1a"/>
                </svg>
            );
        }

        function App() {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            useEffect(() => {
                window.BlissiamTheme?.loadAndApplyTheme();
            }, []);

            async function handleLogin(e) {
                e.preventDefault();
                setLoading(true);
                setError(null);

                try {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;

                    const { data: profile } = await supabase
                        .from('profiles')
                        .select('status')
                        .eq('id', data.user.id)
                        .single();

                    if (profile?.status !== 'admin') {
                        await supabase.auth.signOut();
                        throw new Error('บัญชีนี้ไม่มีสิทธิ์เข้าถึงระบบจัดการ');
                    }

                    window.location.href = 'admin.html';
                } catch (err) {
                    setError(err.message);
                    setLoading(false);
                }
            }

            return (
                <div class="w-full max-w-md">
                    <div class="bg-white rounded-3xl p-8 border border-line">
                        <div class="text-center mb-8">
                            <div class="flex justify-center mb-4">
                                <DotLogo />
                            </div>
                            <div class="text-xl font-bold mb-2">Blissiam</div>
                            <h1 class="text-lg font-semibold text-ink-900">เข้าสู่ระบบเจ้าหน้าที่</h1>
                            <p class="text-ink-500 text-sm mt-1">สำหรับผู้ดูแลระบบเท่านั้น</p>
                        </div>

                        {error && (
                            <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl mb-4 text-sm">
                                {error}
                            </div>
                        )}

                        <form onSubmit={handleLogin} class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-ink-700 mb-1">อีเมล</label>
                                <input
                                    type="email"
                                    value={email}
                                    onChange={e => setEmail(e.target.value)}
                                    required
                                    class="w-full bg-paper-50 border border-line text-ink-900 placeholder-ink-300 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition"
                                    placeholder="admin@blissiam.com"
                                />
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-ink-700 mb-1">รหัสผ่าน</label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={e => setPassword(e.target.value)}
                                    required
                                    class="w-full bg-paper-50 border border-line text-ink-900 placeholder-ink-300 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition"
                                    placeholder="••••••••"
                                />
                            </div>
                            <button
                                type="submit"
                                disabled={loading}
                                class="w-full bg-ink-900 text-white py-3 rounded-full font-medium hover:bg-primary-600 transition disabled:opacity-50"
                            >
                                {loading ? 'กำลังเข้าสู่ระบบ...' : 'เข้าสู่ระบบ'}
                            </button>
                        </form>

                        <a href="index.html" class="block text-center mt-6 text-sm text-ink-500 hover:text-primary-600 transition">
                            ← กลับหน้าแรก
                        </a>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
