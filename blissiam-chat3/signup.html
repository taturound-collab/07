<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สร้างบัญชี | Blissiam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="config.js"></script>
    <link id="blissiam-font-link" href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['var(--font-body)', 'Kanit', 'sans-serif'] },
                    colors: {
                        paper: { 50: '#fdfcfa', 100: '#f6f3ee', 200: '#ece7de', 300: '#ddd6c9' },
                        ink: { 900: '#1a1a1a', 700: '#3a3a3a', 500: '#6b6b6b', 300: '#9c9c9c', 200: '#c2c2c2' },
                        primary: {
                            50: 'var(--color-primary-50)', 100: 'var(--color-primary-100)', 200: 'var(--color-primary-200)',
                            300: 'var(--color-primary-300)', 400: 'var(--color-primary-400)', 500: 'var(--color-primary-500)',
                            600: 'var(--color-primary-600)', 700: 'var(--color-primary-700)'
                        },
                        secondary: {
                            50: 'var(--color-secondary-50)', 100: 'var(--color-secondary-100)', 200: 'var(--color-secondary-200)',
                            300: 'var(--color-secondary-300)', 400: 'var(--color-secondary-400)', 500: 'var(--color-secondary-500)',
                            600: 'var(--color-secondary-600)'
                        },
                        line: '#e8e3d9'
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --color-primary-50: #f3f7f1; --color-primary-100: #e3ece0; --color-primary-200: #c5dcc0;
            --color-primary-300: #9dc295; --color-primary-400: #739e6b; --color-primary-500: #4D7355;
            --color-primary-600: #3d5d44; --color-primary-700: #314936;
            --color-secondary-50: #fbf3ea; --color-secondary-100: #f3e0c8; --color-secondary-200: #e6bf8e;
            --color-secondary-300: #cc9655; --color-secondary-400: #A8662A; --color-secondary-500: #925621; --color-secondary-600: #74441a;
            --font-body: 'Kanit', sans-serif;
        }
    </style>
    <script src="theme.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #fdfcfa; background-image: radial-gradient(circle at 15% 10%, var(--color-primary-50) 0%, transparent 45%), radial-gradient(circle at 85% 90%, var(--color-secondary-50) 0%, transparent 45%); background-attachment: fixed; }
        .dot-pulse circle { animation: dotPulse 1.4s ease-in-out infinite; }
        .dot-pulse circle:nth-child(1) { animation-delay: 0s; }
        .dot-pulse circle:nth-child(2) { animation-delay: 0.1s; }
        .dot-pulse circle:nth-child(3) { animation-delay: 0.2s; }
        .dot-pulse circle:nth-child(4) { animation-delay: 0.1s; }
        .dot-pulse circle:nth-child(5) { animation-delay: 0.2s; }
        .dot-pulse circle:nth-child(6) { animation-delay: 0.3s; }
        .dot-pulse circle:nth-child(7) { animation-delay: 0.2s; }
        .dot-pulse circle:nth-child(8) { animation-delay: 0.3s; }
        .dot-pulse circle:nth-child(9) { animation-delay: 0.4s; }
        @keyframes dotPulse { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-ink-900">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const supabase = window.supabaseClient;

        const RANDOM_NAMES = ['แสงอรุณ', 'สายลม', 'หยาดน้ำ', 'ดวงดาว', 'กลีบดอกไม้', 'หมอกเช้า', 'แสงจันทร์', 'สายฝน'];

        function DotLogo({ size = 28, animated = false }) {
            return (
                <svg width={size} height={size} viewBox="0 0 28 28" fill="none" class={animated ? 'dot-pulse' : ''}>
                    <circle cx="4" cy="4" r="3" fill="#1a1a1a"/><circle cx="14" cy="4" r="3" fill="#1a1a1a"/><circle cx="24" cy="4" r="3" fill="#1a1a1a"/>
                    <circle cx="4" cy="14" r="3" fill="#1a1a1a"/><circle cx="14" cy="14" r="3" fill="var(--color-primary-500)"/><circle cx="24" cy="14" r="3" fill="#1a1a1a"/>
                    <circle cx="4" cy="24" r="3" fill="#1a1a1a"/><circle cx="14" cy="24" r="3" fill="#1a1a1a"/><circle cx="24" cy="24" r="3" fill="#1a1a1a"/>
                </svg>
            );
        }

        function App() {
            const [displayName, setDisplayName] = useState('');
            const [realName, setRealName] = useState('');
            const [school, setSchool] = useState('');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [confirmPassword, setConfirmPassword] = useState('');
            const [loading, setLoading] = useState(true);
            const [submitting, setSubmitting] = useState(false);
            const [error, setError] = useState(null);
            const [success, setSuccess] = useState(null);

            const params = new URLSearchParams(window.location.search);
            const redirect = params.get('redirect') || 'index.html';
            const role = params.get('role');

            useEffect(() => {
                window.BlissiamTheme?.loadAndApplyTheme();
                supabase.auth.getSession().then(({ data: { session } }) => {
                    if (session) window.location.href = redirect;
                    else setLoading(false);
                });
            }, []);

            async function handleSignup(e) {
                e.preventDefault();
                setError(null);
                setSuccess(null);

                if (!realName.trim()) {
                    setError('กรุณากรอกชื่อจริง');
                    return;
                }
                if (!school.trim()) {
                    setError('กรุณากรอกชื่อโรงเรียน/มหาวิทยาลัย');
                    return;
                }
                if (password.length < 6) {
                    setError('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร');
                    return;
                }
                if (password !== confirmPassword) {
                    setError('รหัสผ่านไม่ตรงกัน');
                    return;
                }

                setSubmitting(true);
                const name = displayName.trim()
                    || RANDOM_NAMES[Math.floor(Math.random() * RANDOM_NAMES.length)] + '-' + Math.floor(Math.random() * 9999);

                try {
                    const { data, error } = await supabase.auth.signUp({
                        email,
                        password,
                        options: { data: { display_name: name, real_name: realName.trim(), school: school.trim() } }
                    });
                    if (error) throw error;

                    if (data.session) {
                        await supabase.from('profiles').upsert({
                            id: data.user.id,
                            display_name: name,
                            real_name: realName.trim(),
                            school: school.trim(),
                            status: 'offline',
                            last_seen: new Date().toISOString()
                        });

                        if (redirect === 'queue.html' && role) {
                            await supabase.from('profiles').update({
                                role_preference: role,
                                status: 'waiting',
                                last_seen: new Date().toISOString()
                            }).eq('id', data.user.id);
                            window.location.href = `queue.html?role=${role}`;
                        } else {
                            window.location.href = redirect;
                        }
                        return;
                    }

                    setSuccess('สมัครสำเร็จ! กรุณาตรวจสอบอีเมลเพื่อยืนยันบัญชี แล้วกลับมาลงชื่อเข้าใช้');
                    setSubmitting(false);
                } catch (err) {
                    setError(err.message);
                    setSubmitting(false);
                }
            }

            if (loading) return (
                <DotLogo size={40} animated={true} />
            );

            return (
                <div class="w-full max-w-md">
                    <div class="bg-white rounded-3xl p-8 border border-line">
                        <div class="text-center mb-8">
                            <div class="flex justify-center mb-4">
                                <DotLogo />
                            </div>
                            <div class="text-xl font-bold mb-2">Blissiam</div>
                            <h1 class="text-lg font-semibold text-ink-900">สร้างบัญชี</h1>
                            <p class="text-ink-500 text-sm mt-1">เริ่มต้นแบ่งปันน้ำใจกับเรา</p>
                        </div>

                        {error && (
                            <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl mb-4 text-sm">
                                {error}
                            </div>
                        )}
                        {success && (
                            <div class="bg-primary-50 border border-primary-300 text-primary-700 px-4 py-3 rounded-xl mb-4 text-sm">
                                {success}
                            </div>
                        )}

                        {!success && (
                            <form onSubmit={handleSignup} class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-ink-700 mb-1">ชื่อจริง</label>
                                    <input
                                        type="text"
                                        value={realName}
                                        onChange={e => setRealName(e.target.value)}
                                        required
                                        maxLength={60}
                                        class="w-full bg-white border border-line text-ink-900 placeholder-ink-300 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition"
                                        placeholder="ชื่อ-นามสกุลจริง"
                                    />
                                    <p class="text-xs text-ink-300 mt-1">ใช้เฉพาะเมื่อคุณเลือกโหมด "ระบุตัวตน" ตอนแชทเท่านั้น</p>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-ink-700 mb-1">โรงเรียน / มหาวิทยาลัย</label>
                                    <input
                                        type="text"
                                        value={school}
                                        onChange={e => setSchool(e.target.value)}
                                        required
                                        maxLength={100}
                                        class="w-full bg-white border border-line text-ink-900 placeholder-ink-300 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition"
                                        placeholder="เช่น โรงเรียนสวนกุหลาบวิทยาลัย หรือ จุฬาลงกรณ์มหาวิทยาลัย"
                                    />
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-ink-700 mb-1">ชื่อที่แสดงตอนไม่ระบุตัวตน</label>
                                    <input
                                        type="text"
                                        value={displayName}
                                        onChange={e => setDisplayName(e.target.value)}
                                        maxLength={30}
                                        class="w-full bg-white border border-line text-ink-900 placeholder-ink-300 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition"
                                        placeholder="เช่น สายลม (ไม่บังคับ)"
                                    />
                                    <p class="text-xs text-ink-300 mt-1">ถ้าไม่กรอก ระบบจะตั้งชื่อให้อัตโนมัติ</p>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-ink-700 mb-1">อีเมล</label>
                                    <input
                                        type="email"
                                        value={email}
                                        onChange={e => setEmail(e.target.value)}
                                        required
                                        class="w-full bg-white border border-line text-ink-900 placeholder-ink-300 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition"
                                        placeholder="you@email.com"
                                    />
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-ink-700 mb-1">รหัสผ่าน</label>
                                    <input
                                        type="password"
                                        value={password}
                                        onChange={e => setPassword(e.target.value)}
                                        required
                                        minLength={6}
                                        class="w-full bg-white border border-line text-ink-900 placeholder-ink-300 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition"
                                        placeholder="อย่างน้อย 6 ตัวอักษร"
                                    />
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-ink-700 mb-1">ยืนยันรหัสผ่าน</label>
                                    <input
                                        type="password"
                                        value={confirmPassword}
                                        onChange={e => setConfirmPassword(e.target.value)}
                                        required
                                        class="w-full bg-white border border-line text-ink-900 placeholder-ink-300 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition"
                                        placeholder="••••••••"
                                    />
                                </div>
                                <button
                                    type="submit"
                                    disabled={submitting}
                                    class="w-full bg-primary-500 text-white py-3 rounded-full font-medium hover:bg-primary-600 transition disabled:opacity-50"
                                >
                                    {submitting ? 'กำลังสร้างบัญชี...' : 'สร้างบัญชี'}
                                </button>
                            </form>
                        )}

                        {success ? (
                            <a href="login.html" class="block w-full text-center bg-primary-500 text-white py-3 rounded-full font-medium hover:bg-primary-600 transition mt-2">
                                ไปหน้าลงชื่อเข้าใช้
                            </a>
                        ) : (
                            <p class="text-center mt-6 text-sm text-ink-500">
                                มีบัญชีอยู่แล้ว?{' '}
                                <a href={`login.html?redirect=${encodeURIComponent(redirect)}${role ? '&role=' + role : ''}`} class="text-primary-600 hover:text-primary-700 font-medium">
                                    ลงชื่อเข้าใช้
                                </a>
                            </p>
                        )}

                        <a href="index.html" class="block text-center mt-4 text-sm text-ink-500 hover:text-primary-600 transition">
                            ← กลับหน้าแรก
                        </a>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
